name: Release QQ Music Account Connector

# Triggered on every push to main:
#   1. install deps + run tests (must pass)
#   2. verify dist/index.js is committed and matches a fresh build
#   3. if package.json's version isn't yet tagged, create the tag + GitHub
#      Release MusicConnect-QQMusic-Account with dist artifacts attached
#
# Developer flow:
#   1. edit src/
#   2. write/update tests under src/__tests__/
#   3. npm test (locally) until green
#   4. npm version patch|minor|major --no-git-tag-version
#   5. npm run build  (refreshes dist/)
#   6. commit (incl. dist/) + push to main
#   7. CI runs the same tests + tags + releases

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test --silent

      - name: Verify dist/index.js exists and is up-to-date
        run: |
          npm run build
          git ls-files --error-unmatch dist/index.js dist/index.d.ts
          git diff --exit-code -- dist/index.js dist/index.d.ts

      - name: Read package.json version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Ensure tag and GitHub Release exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.pkg.outputs.version }}"
          git fetch --force --tags origin
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
          fi
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" dist/index.js \
              --title "$tag" \
              --notes "Auto-released from \`${GITHUB_SHA::7}\`. Pin via cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@${tag}/dist/index.js"
          fi
